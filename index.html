<style>
  :root{
    --bg:#120e1a;
    --bg-2:#1a1426;
    --card:#211a30;
    --card-edge:#332843;
    --ink:#f5f2f8;
    --ink-soft:#b3a6c4;
    --ink-mute:#807091;
    --accent:#9b6dff;       /* 紫系アクセント */
    --accent-deep:#6f3fd4;
    --accent-glow:rgba(155,109,255,.38);
    --line:rgba(255,255,255,.07);
    --radius:22px;
    --font: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP", "Yu Gothic", Meiryo, sans-serif;
  }

  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    font-family:var(--font);
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(155,109,255,.12), transparent 60%),
      linear-gradient(180deg, var(--bg-2), var(--bg) 40%);
    color:var(--ink);
    min-height:100dvh;
    display:flex; align-items:flex-start; justify-content:center;
    padding:0; overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ============ LOADING OVERLAY ============ */
  #loader{
    position:fixed; inset:0; z-index:50;
    background:linear-gradient(180deg, var(--bg-2), var(--bg));
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;
    transition:opacity .6s ease, visibility .6s ease;
  }
  #loader.hide{ opacity:0; visibility:hidden; }

  .logo-orb{
    width:128px; height:128px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:transparent;
    box-shadow:0 0 0 0 var(--accent-glow);
    position:relative;
    opacity:0; transform:scale(.55);
    animation:orbIn 1.05s cubic-bezier(.2,.8,.2,1) forwards, orbPulse 2.2s ease-in-out .9s infinite;
  }
  .logo-orb img{ width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .logo-orb .mono{
    font-weight:800; font-size:46px; letter-spacing:1px; color:#fff;
    text-shadow:0 2px 10px rgba(0,0,0,.25);
  }
  /* halo ring */
  .logo-orb::after{
    content:""; position:absolute; inset:-10px; border-radius:50%;
    border:2px solid var(--accent-glow);
    opacity:0; animation:haloIn 1.2s ease .25s forwards;
  }

  .loader-name{
    color:var(--ink-soft); font-size:14px; letter-spacing:.14em;
    opacity:0; transform:translateY(6px);
    animation:fadeUp .7s ease .55s forwards;
  }

  @keyframes orbIn{
    0%{ opacity:0; transform:scale(.55) translateY(8px); filter:blur(6px); }
    60%{ opacity:1; transform:scale(1.06) translateY(0); filter:blur(0); }
    100%{ opacity:1; transform:scale(1) translateY(0); }
  }
  @keyframes orbPulse{
    0%,100%{ box-shadow:0 0 0 0 var(--accent-glow); }
    50%{ box-shadow:0 0 38px 6px var(--accent-glow); }
  }
  @keyframes haloIn{
    0%{ opacity:0; transform:scale(.7); }
    100%{ opacity:.8; transform:scale(1); }
  }
  @keyframes fadeUp{
    to{ opacity:1; transform:translateY(0); }
  }

  /* ============ CARD ============ */
  .wrap{
    width:100%; max-width:440px; padding:26px 18px 60px;
    opacity:0; transform:translateY(20px);
  }
  .wrap.show{
    animation:cardIn .8s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes cardIn{ to{ opacity:1; transform:translateY(0); } }

  .card{
    background:linear-gradient(180deg, var(--card), var(--bg-2));
    border:1px solid var(--card-edge);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.02) inset;
  }

  /* banner */
  .banner{
    height:118px; position:relative;
    background:
      radial-gradient(420px 160px at 25% 0%, rgba(155,109,255,.5), transparent 65%),
      linear-gradient(120deg, var(--accent-deep), #2e1d52 70%);
  }
  .banner::after{
    content:""; position:absolute; inset:0;
    background:
      repeating-linear-gradient(115deg, rgba(255,255,255,.05) 0 2px, transparent 2px 26px);
    opacity:.5;
  }

  .avatar{
    position:absolute; left:50%; bottom:-44px; transform:translateX(-50%);
    width:108px; height:108px; border-radius:50%;
    background:var(--card);
    display:flex; align-items:center; justify-content:center;
    border:4px solid var(--card);
    box-shadow:0 12px 30px -8px rgba(0,0,0,.55);
    overflow:hidden;
  }
  .avatar img{ width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .avatar .mono{ font-weight:800; font-size:40px; color:#fff; }

  .body{ padding:60px 24px 26px; text-align:center; }

  .name{ font-size:25px; font-weight:800; letter-spacing:.01em; }
  .name .en{ display:block; font-size:13px; font-weight:600; color:var(--ink-mute); letter-spacing:.16em; margin-top:5px; text-transform:uppercase; }
  .org{ margin-top:12px; color:var(--ink-soft); font-size:14px; line-height:1.6; }
  .role{ margin-top:3px; color:var(--ink-mute); font-size:13px; }

  /* primary save button */
  .save{
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; margin-top:24px; padding:16px 18px;
    background:linear-gradient(180deg, var(--accent), var(--accent-deep));
    color:#fff; font-size:16px; font-weight:700; letter-spacing:.02em;
    border:none; border-radius:15px; cursor:pointer;
    box-shadow:0 12px 24px -10px var(--accent-glow), 0 0 0 1px rgba(255,255,255,.08) inset;
    transition:transform .12s ease, box-shadow .25s ease;
  }
  .save:active{ transform:scale(.975); }
  .save svg{ width:20px; height:20px; }
  .save.saved{ background:linear-gradient(180deg,#2bb673,#1c8f57); }

  .hint{ margin-top:10px; font-size:12px; color:var(--ink-mute); }

  /* contact rows */
  .links{ margin-top:22px; display:flex; flex-direction:column; gap:10px; text-align:left; }
  .row{
    display:flex; align-items:center; gap:14px;
    padding:13px 15px; border-radius:14px;
    background:rgba(255,255,255,.025);
    border:1px solid var(--line);
    color:var(--ink); text-decoration:none;
    transition:background .2s ease, border-color .2s ease, transform .12s ease;
  }
  .row:active{ transform:scale(.99); }
  .row:hover{ background:rgba(155,109,255,.08); border-color:rgba(155,109,255,.3); }
  .ic{
    width:40px; height:40px; flex:0 0 40px; border-radius:11px;
    display:flex; align-items:center; justify-content:center;
    background:rgba(155,109,255,.12); color:var(--accent);
  }
  .ic svg{ width:20px; height:20px; }
  .row .meta{ flex:1; min-width:0; display:flex; flex-direction:column; }
  .row .lbl{ display:block; font-size:11px; color:var(--ink-mute); letter-spacing:.08em; text-transform:uppercase; line-height:1.2; }
  .row .val{ display:block; font-size:14.5px; color:var(--ink); margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; line-height:1.3; }
  .row .chev{ color:var(--ink-mute); flex:0 0 auto; }
  .row .chev svg{ width:16px; height:16px; }

  /* social */
  .social{ margin-top:18px; display:flex; gap:12px; justify-content:center; }
  .social a{
    width:48px; height:48px; border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.04); border:1px solid var(--line);
    color:var(--ink-soft); transition:transform .12s ease, background .2s ease, color .2s ease, border-color .2s ease;
  }
  .social a:active{ transform:scale(.94); }
  .social a:hover{ background:rgba(155,109,255,.12); color:var(--accent); border-color:rgba(155,109,255,.3); }
  .social a svg{ width:22px; height:22px; }

  .footer{ text-align:center; margin-top:24px; font-size:11px; color:var(--ink-mute); letter-spacing:.04em; }

  @media (prefers-reduced-motion: reduce){
    .logo-orb, .loader-name, .wrap{ animation:none !important; opacity:1 !important; transform:none !important; }
  }
</style>
</head>

  function buildVCard(){
    return [
      'BEGIN:VCARD',
      'VERSION:3.0',
      'N:長峰;幸平;;;',
      'FN:長峰 幸平',
      'NICKNAME:Kohei Nagamine',
      'ORG:公益財団法人仙台市スポーツ振興事業団',
      'TEL;TYPE=WORK,VOICE:022-215-3201',
      'EMAIL;TYPE=WORK:nagamine_kohei@spf-sendai.jp',
      'URL:https://www.sendaicity-gym.com/',
      'ADR;TYPE=WORK:;;錦町1-3-9;仙台市青葉区;宮城県;980-0012;日本',
      'X-SOCIALPROFILE;TYPE=instagram:https://www.instagram.com/sendaigym1984/',
      'X-SOCIALPROFILE;TYPE=twitter:https://x.com/sendaicitygym',
      'END:VCARD'
    ].join('\r\n');
  }

  function saveContact(){
    var vcf = buildVCard();
    var blob = new Blob([vcf], { type:'text/vcard;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = '長峰幸平.vcf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);

    var btn = document.getElementById('saveBtn');
    var lbl = document.getElementById('saveLabel');
    btn.classList.add('saved');
    lbl.textContent = '連絡先を追加しました';
    setTimeout(function(){
      btn.classList.remove('saved');
      lbl.textContent = '連絡先に保存';
    }, 2600);
  }
  document.getElementById('saveBtn').addEventListener('click', saveContact);

  /* ---- loading sequence ---- */
  window.addEventListener('load', function(){
    var minShow = 1700; // ロゴ演出を見せる最低時間(ms)
    var start = performance.now();
    function reveal(){
      document.getElementById('loader').classList.add('hide');
      document.getElementById('wrap').classList.add('show');
    }
    var elapsed = performance.now() - start;
    setTimeout(reveal, Math.max(0, minShow - elapsed));
  });
</script>
